name: Quant Energy Pipeline — CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Daily market-open run (Mon-Fri 9:00 AM EST = 14:00 UTC)
    - cron: '0 14 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Pipeline mode'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - bsm-demo
          - mc-demo
          - stress-only
          - ppm
          - risk-report

env:
  PYTHON_VERSION: "3.11"
  PYTHONPATH: ${{ github.workspace }}

jobs:

  # ── 1. LINT & FORMAT ──────────────────────────────────────────────────────
  lint:
    name: Lint & Format (black + ruff + isort)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint deps
        run: pip install black ruff isort

      - name: black — format check
        run: black --check --line-length 100 data_agent.py strategy_agent.py risk_agent.py main.py

      - name: ruff — style & import check
        run: ruff check data_agent.py strategy_agent.py risk_agent.py main.py

      - name: isort — import order check
        run: isort --check-only --profile black --line-length 100 data_agent.py strategy_agent.py risk_agent.py main.py

  # ── 2. TYPE CHECKING ──────────────────────────────────────────────────────
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt mypy

      - name: mypy — static type check
        run: mypy data_agent.py strategy_agent.py risk_agent.py main.py --ignore-missing-imports --no-strict-optional

  # ── 3. UNIT TESTS ─────────────────────────────────────────────────────────
  test:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock

      - name: Run tests — data_agent
        run: pytest tests/test_data_agent.py -v --tb=short -q

      - name: Run tests — strategy_agent (BSM / Black-76 / Monte Carlo)
        run: pytest tests/test_strategy_agent.py -v --tb=short -q

      - name: Run tests — risk_agent (VaR / stress / Greeks)
        run: pytest tests/test_risk_agent.py -v --tb=short -q

      - name: Coverage report
        run: pytest tests/ --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: unittests
          name: quant-energy-pipeline

  # ── 4. BSM / BLACK-76 SMOKE TEST ──────────────────────────────────────────
  model-smoke:
    name: Black-76 + Monte Carlo Smoke Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Black-76 Greeks demo (offline, synthetic data)
        run: python main.py --bsm-demo --spot 72.0 --sigma 0.32 --quiet

      - name: Monte Carlo demo (GBM + OU, 10K paths, offline)
        run: python main.py --mc-demo --spot 72.0 --sigma 0.32 --quiet

      - name: Stress test report (offline)
        run: python main.py --stress-only --quiet

  # ── 5. FULL PIPELINE (offline / synthetic data) ───────────────────────────
  pipeline-offline:
    name: Full Pipeline — Offline (synthetic data)
    runs-on: ubuntu-latest
    needs: [model-smoke, typecheck]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full pipeline (synthetic data — no live API calls)
        run: python main.py --ticker CL=F --fund "CI Test Fund" --quiet
        timeout-minutes: 5

      - name: PPM report generation
        run: python main.py --ppm --quiet

      - name: Risk report
        run: python main.py --risk-report

      - name: Upload pipeline log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-log-${{ github.run_number }}
          path: quant_energy_pipeline.log
          retention-days: 30

  # ── 6. RISK PARAMETER GUARD ───────────────────────────────────────────────
  risk-guard:
    name: Risk Parameter Integrity Check
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Verify hardcoded risk limits not modified
        run: |
          python - <<'EOF'
          import ast, sys

          with open("risk_agent.py") as f:
              source = f.read()

          REQUIRED_CONSTANTS = {
              "FUND_EQUITY_USD":             10_000_000.0,
              "MAX_RISK_PER_TRADE_PCT":      0.01,
              "MAX_PORTFOLIO_HEAT_PCT":      0.08,
              "MAX_WTI_CONTRACTS":           50,
              "MAX_DAILY_LOSS_USD":          100_000,
              "MAX_ABSOLUTE_DRAWDOWN_PCT":   0.15,
              "VAR_CONFIDENCE":              0.99,
              "MAX_VAR_1D_99_USD":           250_000,
              "MIN_DTE":                     21,
          }

          tree = ast.parse(source)
          found = {}
          for node in ast.walk(tree):
              if isinstance(node, ast.Assign):
                  for target in node.targets:
                      if isinstance(target, ast.Name) and target.id in REQUIRED_CONSTANTS:
                          try:
                              found[target.id] = ast.literal_eval(node.value)
                          except Exception:
                              pass

          failed = []
          for k, expected in REQUIRED_CONSTANTS.items():
              actual = found.get(k)
              if actual != expected:
                  failed.append(f"  {k}: expected {expected}, found {actual}")

          if failed:
              print("RISK PARAMETER GUARD — FAILURES:")
              for f in failed: print(f)
              sys.exit(1)
          else:
              print("All hardcoded risk parameters verified ✓")
          EOF

  # ── 7. SECURITY SCAN ──────────────────────────────────────────────────────
  security:
    name: Security Scan (bandit + pip-audit)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: bandit — static security analysis
        run: bandit -r data_agent.py strategy_agent.py risk_agent.py main.py -ll --quiet

      - name: pip-audit — dependency vulnerability scan
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-42969 || true

  # ── 8. CLAUDE CODE VALIDATION ─────────────────────────────────────────────
  claude-code-check:
    name: CLAUDE.md Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify CLAUDE.md exists and has required sections
        run: |
          python - <<'EOF'
          import sys

          with open("CLAUDE.md") as f:
              content = f.read()

          required_sections = [
              "## Architecture",
              "## Critical Constraints",
              "## Pricing Conventions",
              "## Running the Pipeline",
              "## Dependencies",
              "## Data Flow",
              "## Hardcoded Risk Limits",
          ]

          missing = [s for s in required_sections if s not in content]
          if missing:
              print("CLAUDE.md missing sections:")
              for m in missing: print(f"  {m}")
              sys.exit(1)
          print("CLAUDE.md validation passed ✓")
          EOF

  # ── 9. NOTIFY ON FAILURE ──────────────────────────────────────────────────
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, model-smoke, pipeline-offline, risk-guard, security]
    if: failure()

    steps:
      - name: Create failure summary
        run: |
          echo "## ❌ CI Failed — ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the [Actions tab](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." >> $GITHUB_STEP_SUMMARY
